name: Android CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Check and Fix Gradlew
      run: |
        echo "=== Checking gradlew ==="
        ls -la ./gradlew
        file ./gradlew
        head -3 ./gradlew
        echo ""
        echo "=== Checking wrapper jar ==="
        ls -la gradle/wrapper/
        echo ""
        echo "=== Fixing line endings and permissions ==="
        sed -i 's/\r$//' ./gradlew
        chmod +x ./gradlew
        ls -la ./gradlew

    - name: Create Keystore
      run: |
        echo "=== Creating Keystore ==="
        keytool -genkey -v -keystore app/keystore.jks -alias timetracker -keyalg RSA -keysize 2048 -validity 10000 -storepass timetracker123 -keypass timetracker123 -dname "CN=TimeTracker"

    - name: Build with Gradlew
      env:
        KEYSTORE_PASSWORD: timetracker123
        KEY_ALIAS: timetracker
        KEY_PASSWORD: timetracker123
      run: |
        echo "=== Building with Gradlew ==="
        bash -x ./gradlew assembleRelease --stacktrace --no-daemon
        echo "✅ Build completed"

    - name: Check APK
      run: |
        echo "=== Checking APK ==="
        find . -name "*.apk" -type f
        ls -la app/build/outputs/apk/release/ 2>&1 || echo "No release dir"

    - name: Upload Release APK
      uses: softprops/action-gh-release@v1
      if: success() && github.ref == 'refs/heads/main'
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        files: app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}