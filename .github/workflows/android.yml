name: Android CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Create Keystore
      run: |
        echo "=== Creating Keystore ==="
        keytool -genkey -v -keystore app/keystore.jks -alias timetracker -keyalg RSA -keysize 2048 -validity 10000 -storepass timetracker123 -keypass timetracker123 -dname "CN=TimeTracker"
        echo "Keystore created successfully"

    - name: Grant execute permission for gradlew
      run: |
        echo "=== Setting up Gradlew ==="
        chmod +x ./gradlew
        ls -la ./gradlew

    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: timetracker123
        KEY_ALIAS: timetracker
        KEY_PASSWORD: timetracker123
      run: |
        echo "=== Building Release APK ==="
        bash ./gradlew assembleRelease --stacktrace --no-daemon
        echo "=== Build completed ==="

    - name: Check APK exists
      run: |
        echo "=== Checking for APK files ==="
        echo "Current directory: $(pwd)"
        echo ""
        echo "Listing app/build contents:"
        ls -la app/build/ 2>&1 || echo "ERROR: app/build/ does not exist"
        echo ""
        echo "Finding all APK files:"
        find . -name "*.apk" -type f 2>&1 || echo "ERROR: No APK files found"
        echo ""
        echo "Checking release directory:"
        ls -la app/build/outputs/apk/release/ 2>&1 || echo "ERROR: release directory does not exist"

    - name: Upload Release APK
      uses: softprops/action-gh-release@v1
      if: success() && github.ref == 'refs/heads/main'
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        files: app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}