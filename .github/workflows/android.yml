name: Android CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Check project structure
      run: |
        echo "=== Checking project ==="
        ls -la
        echo ""
        echo "=== Checking gradlew ==="
        file ./gradlew
        head -5 ./gradlew
        echo ""
        echo "=== Checking build.gradle ==="
        ls -la *.gradle

    - name: Create Keystore
      run: |
        echo "=== Creating Keystore ==="
        keytool -genkey -v -keystore app/keystore.jks -alias timetracker -keyalg RSA -keysize 2048 -validity 10000 -storepass timetracker123 -keypass timetracker123 -dname "CN=TimeTracker"

    - name: Build with Gradle directly
      env:
        KEYSTORE_PASSWORD: timetracker123
        KEY_ALIAS: timetracker
        KEY_PASSWORD: timetracker123
      run: |
        echo "=== Building with system gradle ==="
        gradle assembleRelease --stacktrace --project-dir . || {
          echo "❌ BUILD FAILED!"
          exit 1
        }
        echo "✅ Build completed"

    - name: Check APK
      run: |
        echo "=== Checking APK ==="
        find . -name "*.apk" -type f
        ls -la app/build/outputs/apk/release/ 2>&1 || echo "No release dir"

    - name: Upload Release APK
      uses: softprops/action-gh-release@v1
      if: success() && github.ref == 'refs/heads/main'
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        files: app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}