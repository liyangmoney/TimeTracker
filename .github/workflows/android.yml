name: Android CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Create Keystore
      run: |
        echo "=== Step 1: Creating Keystore ==="
        keytool -genkey -v -keystore app/keystore.jks -alias timetracker -keyalg RSA -keysize 2048 -validity 10000 -storepass timetracker123 -keypass timetracker123 -dname "CN=TimeTracker"
        echo "✅ Keystore created"

    - name: Grant execute permission for gradlew
      run: |
        echo "=== Step 2: Setting up Gradlew ==="
        chmod +x ./gradlew
        ls -la ./gradlew
        echo "✅ Gradlew ready"

    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: timetracker123
        KEY_ALIAS: timetracker
        KEY_PASSWORD: timetracker123
      run: |
        echo "=== Step 3: Building Release APK ==="
        bash ./gradlew assembleRelease --stacktrace --no-daemon || {
          echo "❌ BUILD FAILED!"
          echo "=== Listing project structure ==="
          ls -la
          echo "=== Checking gradle files ==="
          ls -la gradle/wrapper/
          exit 1
        }
        echo "✅ Build completed"

    - name: Check APK exists
      run: |
        echo "=== Step 4: Checking APK ==="
        echo "Current directory: $(pwd)"
        ls -la app/build/outputs/apk/release/ || {
          echo "❌ APK not found!"
          exit 1
        }
        echo "✅ APK found"

    - name: Upload Release APK
      uses: softprops/action-gh-release@v1
      if: success() && github.ref == 'refs/heads/main'
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        files: app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}