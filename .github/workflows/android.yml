name: Android CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Create Keystore
      run: |
        mkdir -p logs
        keytool -genkey -v -keystore app/keystore.jks -alias timetracker -keyalg RSA -keysize 2048 -validity 10000 -storepass timetracker123 -keypass timetracker123 -dname "CN=TimeTracker" 2>&1 | tee logs/01-keystore.log
        echo "=== Step 1: Keystore Creation ==="
        cat logs/01-keystore.log

    - name: Grant execute permission for gradlew
      run: |
        chmod +x ./gradlew 2>&1 | tee logs/02-gradlew.log
        echo "=== Step 2: Gradlew Permission ==="
        cat logs/02-gradlew.log

    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: timetracker123
        KEY_ALIAS: timetracker
        KEY_PASSWORD: timetracker123
      run: |
        set -x
        echo "=== Starting Gradle Build ==="
        bash ./gradlew assembleRelease --stacktrace --no-daemon 2>&1 | tee logs/03-build.log
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        echo "=== Build completed with exit code: $BUILD_EXIT_CODE ==="
        echo "BUILD_EXIT_CODE=$BUILD_EXIT_CODE" >> $GITHUB_ENV
        exit $BUILD_EXIT_CODE

    - name: Check APK exists
      run: |
        echo "=== Checking output directories..." | tee logs/04-check.log
        echo "Current directory: $(pwd)" | tee -a logs/04-check.log
        echo "Listing app/build directory:" | tee -a logs/04-check.log
        ls -la app/build/ 2>&1 | tee -a logs/04-check.log || echo "No app/build directory" | tee -a logs/04-check.log
        echo "Finding APK files:" | tee -a logs/04-check.log
        find app/build -name "*.apk" -type f 2>&1 | tee -a logs/04-check.log
        echo "Checking outputs/apk/release:" | tee -a logs/04-check.log
        ls -la app/build/outputs/apk/release/ 2>&1 | tee -a logs/04-check.log || echo "No release directory" | tee -a logs/04-check.log
        echo "=== Step 4: Check Results ==="
        cat logs/04-check.log

    - name: Upload logs to repo
      if: always()
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add logs/
        git commit -m "Add build logs from run ${{ github.run_number }}" || echo "No changes to commit"
        git push || echo "Push failed"

    - name: Upload Release APK
      uses: softprops/action-gh-release@v1
      if: success() && github.ref == 'refs/heads/main'
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        files: app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
